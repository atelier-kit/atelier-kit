<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Atelier-Kit agent-led planning architecture</title>
  <desc id="desc">Atelier-Kit is host-native by default, can activate through explicit Atelier requests or native plan hooks, lets the agent and skills drive planning phases, stores V2 state under .atelier/epics, exports a native plan mirror at planned, then reviews implementation against the plan.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f5bd8"/>
      <stop offset="1" stop-color="#083b8c"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f8f6b"/>
      <stop offset="1" stop-color="#03624a"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5d18b8"/>
      <stop offset="1" stop-color="#28006f"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d93434"/>
      <stop offset="1" stop-color="#9d1111"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#1556c5"/>
    </marker>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#08775d"/>
    </marker>
    <style>
      .bg { fill: #f7faff; }
      .title { font: 800 58px Arial, Helvetica, sans-serif; fill: #28006f; letter-spacing: 0; }
      .subtitle { font: 700 25px Arial, Helvetica, sans-serif; fill: #0f4fb0; letter-spacing: 0; }
      .section { fill: #ffffff; stroke: #1556c5; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .section-violet { fill: #ffffff; stroke: #4f149d; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .section-teal { fill: #f8fffc; stroke: #08775d; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .section-red { fill: #fffafa; stroke: #bd1212; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .label { font: 800 20px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #1a5cc9; stroke-width: 1.7; rx: 10; }
      .card-violet { fill: #ffffff; stroke: #5a18ad; stroke-width: 1.7; rx: 10; }
      .card-teal { fill: #ffffff; stroke: #0a7c60; stroke-width: 1.7; rx: 10; }
      .card-red { fill: #ffffff; stroke: #c51616; stroke-width: 1.7; rx: 10; }
      .h1 { font: 800 21px Arial, Helvetica, sans-serif; fill: #0f4fb0; letter-spacing: 0; }
      .h1-violet { font: 800 21px Arial, Helvetica, sans-serif; fill: #4b1295; letter-spacing: 0; }
      .h1-teal { font: 800 21px Arial, Helvetica, sans-serif; fill: #08775d; letter-spacing: 0; }
      .h1-red { font: 800 21px Arial, Helvetica, sans-serif; fill: #bd1212; letter-spacing: 0; }
      .body { font: 17px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0; }
      .mono { font: 15px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #111827; letter-spacing: 0; }
      .mono-small { font: 13px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #111827; letter-spacing: 0; }
      .muted { fill: #64748b; }
      .pill-blue { fill: url(#blue); rx: 18; }
      .pill-violet { fill: url(#violet); rx: 18; }
      .pill-teal { fill: url(#teal); rx: 18; }
      .pill-red { fill: url(#red); rx: 18; }
      .arrow { stroke: #1556c5; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); stroke-linecap: round; }
      .arrow-teal { stroke: #08775d; stroke-width: 4; fill: none; marker-end: url(#arrow-teal); stroke-linecap: round; }
      .dash { stroke: #c8d7ef; stroke-width: 1.5; stroke-dasharray: 3 5; }
      .footer { fill: url(#blue); rx: 16; }
      .footer-text { font: 800 23px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="980"/>

  <text id="main-title" x="700" y="70" text-anchor="middle" class="title">Atelier-Kit</text>
  <text x="700" y="108" text-anchor="middle" class="subtitle">Agent-led planning protocol with native implementation</text>

  <rect x="34" y="138" width="1332" height="182" class="section-violet"/>
  <rect x="58" y="158" width="210" height="36" class="pill-violet"/>
  <text x="82" y="183" class="label">Activation model</text>

  <rect x="70" y="214" width="278" height="76" class="card-violet"/>
  <text x="94" y="242" class="h1-violet">Host-native by default</text>
  <text x="94" y="267" class="mono">/plan ...</text>
  <text x="94" y="286" class="small">No Atelier state unless activated.</text>

  <path d="M365 252 H440" class="arrow"/>

  <rect x="462" y="214" width="370" height="76" class="card-violet"/>
  <text x="486" y="242" class="h1-violet">Two activation paths</text>
  <text x="486" y="267" class="mono">/atelier quick|plan|deep</text>
  <text x="486" y="286" class="small">or native-plan hook during host plan mode.</text>

  <path d="M850 252 H925" class="arrow"/>

  <rect x="948" y="214" width="356" height="76" class="card-violet"/>
  <text x="972" y="242" class="h1-violet">V2 source of truth</text>
  <text x="972" y="266" class="mono">.atelier/active.json</text>
  <text x="972" y="286" class="mono">.atelier/epics/&lt;epic&gt;/state.json</text>

  <rect x="34" y="350" width="1332" height="300" class="section"/>
  <rect x="58" y="370" width="260" height="36" class="pill-blue"/>
  <text x="82" y="395" class="label">Planning engine</text>

  <rect x="70" y="430" width="240" height="146" class="card"/>
  <text x="94" y="462" class="h1">Host agent</text>
  <text x="94" y="492" class="body">Does the reasoning,</text>
  <text x="94" y="516" class="body">reads the repo, and</text>
  <text x="94" y="540" class="body">writes the artifacts.</text>
  <line x1="94" y1="554" x2="286" y2="554" class="dash"/>
  <text x="94" y="573" class="mono-small">Claude, Cursor, Codex, Kiro...</text>

  <path d="M328 502 H404" class="arrow"/>

  <rect x="426" y="430" width="330" height="146" class="card"/>
  <text x="450" y="462" class="h1">Skills drive phases</text>
  <text x="450" y="492" class="mono-small">questioner -> repo-analyst</text>
  <text x="450" y="516" class="mono-small">tech/business -> designer</text>
  <text x="450" y="540" class="mono-small">planner -> reviewer</text>
  <line x1="450" y1="554" x2="732" y2="554" class="dash"/>
  <text x="450" y="573" class="small">No CLI required between phases.</text>

  <path d="M774 502 H850" class="arrow"/>

  <rect x="872" y="430" width="230" height="146" class="card-teal"/>
  <text x="896" y="462" class="h1-teal">Epic ledger</text>
  <text x="896" y="492" class="mono-small">questions.md</text>
  <text x="896" y="516" class="mono-small">research/*.md</text>
  <text x="896" y="540" class="mono-small">design.md / plan.md</text>
  <line x1="896" y1="554" x2="1078" y2="554" class="dash"/>
  <text x="896" y="573" class="mono-small">state.json slices</text>

  <path d="M1120 502 H1196" class="arrow-teal"/>

  <rect x="1218" y="430" width="116" height="146" class="card-teal"/>
  <text x="1276" y="462" text-anchor="middle" class="h1-teal">Plan</text>
  <text x="1276" y="492" text-anchor="middle" class="mono-small">planned</text>
  <text x="1276" y="516" text-anchor="middle" class="mono-small">mirror</text>
  <text x="1276" y="540" text-anchor="middle" class="mono-small">native</text>
  <text x="1276" y="570" text-anchor="middle" class="small">ready</text>

  <rect x="72" y="608" width="1232" height="30" class="card"/>
  <text x="92" y="628" class="small">Phase path: questions -> research -> synthesis/design -> plan.md with slices -> status=planned -> export native mirror</text>

  <rect x="34" y="684" width="632" height="166" class="section-teal"/>
  <rect x="58" y="704" width="238" height="36" class="pill-teal"/>
  <text x="82" y="729" class="label">Minimal CLI helpers</text>
  <text x="72" y="772" class="body">The CLI scaffolds, validates, exports, and reviews.</text>
  <text x="72" y="802" class="mono-small">init / install-adapter / validate / doctor</text>
  <text x="72" y="826" class="mono-small">export-plan / review / host-plan finalize</text>
  <text x="72" y="844" class="small">next/done remain optional lifecycle helpers.</text>

  <rect x="734" y="684" width="632" height="166" class="section-red"/>
  <rect x="758" y="704" width="238" height="36" class="pill-red"/>
  <text x="782" y="729" class="label">Boundary invariant</text>
  <text x="772" y="772" class="body">Atelier stops at </text>
  <text x="890" y="772" class="mono">planned</text>
  <text x="966" y="772" class="body"> and exports the native plan mirror.</text>
  <text x="772" y="802" class="body">Implementation stays in the host agent workflow.</text>
  <text x="772" y="832" class="body">Review compares diff and validation against </text>
  <text x="1100" y="832" class="mono-small">.atelier/epics/&lt;epic&gt;/plan.md</text>

  <rect x="34" y="884" width="1332" height="52" class="footer"/>
  <text x="700" y="917" text-anchor="middle" class="footer-text">Ask for planning -> agent follows skills -> final plan -> native mirror -> native implementation -> review</text>
</svg>
